eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

spring:
  application:
    name: gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: song-service
          uri: lb://song-service
          predicates:
            - Path=/songs/**

        - id: resource-service
          uri: lb://resource-service
          predicates:
            - Path=/resources/**

        - id: storage-service
          uri: lb://storage-service
          predicates:
            - Path=/storages/**

        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/users, /auth/users/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info, refresh, prometheus, gateway
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: w3c
    baggage:
      remote-fields: x-trace-id
      correlation-fields: trace-id
