eureka:
  client:
    serviceUrl:
      defaultZone: http://discovery-service:8761/eureka/
  instance:
    prefer-ip-address: true

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://auth-service:9000
          jwk-set-uri: http://auth-service:9000/oauth2/jwks
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${SONG_DB_HOST:song-db}:${SONG_DB_PORT:5432}/${SONG_DB_NAME:song_db}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME}}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
