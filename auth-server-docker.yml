server:
  port: 9000
  servlet:
    context-path: /auth

spring:
  application:
    name: auth-server
  datasource:
    url: jdbc:postgresql://auth-db:5432/auth_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    root: INFO
    org.springframework.security: DEBUG
